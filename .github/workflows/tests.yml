name: EvaP Test Suite

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test + Coverage

    runs-on: ubuntu-22.04

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/setup_evap
        with:
          start-db: true
          save-nix-store: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Run tests
        run: coverage run --concurrency=multiprocessing manage.py test --parallel 4
      - name: Combine coverage reports
        run: coverage combine
      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test_shuffled:
    name: Test (shuffled order)

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/setup_evap
        with:
          start-db: true

      - name: Run tests
        run: python manage.py test --shuffle --parallel 4

  test_testdata:
    name: Test if testdata is up to date

    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/setup_evap
        with:
          start-db: true
      - name: Create new test_data.json
        run: |
          python manage.py reload_testdata --noinput
          python manage.py dump_testdata
      - name: Check if test_data.json changed
        run: git diff --exit-code
      - name: Create new minimal_test_data_results.json
        run: |
          python manage.py reload_testdata --mode minimal --noinput
          python manage.py dump_testdata --mode minimal
      - name: Check if minimal_test_data_results.json changed
        run: git diff --exit-code

  build_wheel:
    name: Build wheel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock', 'uv.lock', 'evap/development/manage_autocompletion.sh') }}-build_wheel
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock', 'uv.lock', 'evap/development/manage_autocompletion.sh') }}-
          save: false
      - run: nix run .#build-dist
      - run: tar tvf dist/*.tar.gz
      - run: unzip -l dist/*.whl
      - run: nix run .#check_dist -- pyproject.toml dist/*.whl
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: wheel
          path: dist/

  install_wheel:
    name: Install wheel with system Python
    needs: build_wheel
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wheel
      - run: pip install *.whl
      - name: Check that "evaluation" section appears in help string
        run: python -m evap --help | grep --fixed-strings "[evaluation]"

  test_frontend:
    name: Test Frontend

    runs-on: ubuntu-22.04

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - uses: ./.github/setup_evap
        with:
          shell: .#evap-frontend-dev
          npm-ci: true
          start-db: true

      - name: Compile assets
        run: |
          python manage.py ts compile
          python manage.py scss

      - name: Run tests (shuffled)
        run: coverage run  --concurrency=multiprocessing manage.py test --shuffle --tag selenium --parallel 4
      - name: Combine coverage reports
        run: coverage combine
      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          flags: frontend-tests
          token: ${{ secrets.CODECOV_TOKEN }}

  mypy:
    runs-on: ubuntu-22.04

    name: MyPy

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/setup_evap
      - name: Run MyPy
        run: mypy

  typescript:
    runs-on: ubuntu-22.04
    name: Test Typescript

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
      - uses: ./.github/setup_evap
        with:
          npm-ci: true

      - name: Run tests
        run: python manage.py ts test

  linter:
    runs-on: ubuntu-22.04

    name: Linter

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/setup_evap
        with:
          npm-ci: "true"

      - name: Run ruff
        run: ruff check .
      - name: Run pylint
        run: pylint evap tools
      - name: Run ESLint
        run: |
          cd evap/static/ts
          npx eslint

  formatter:
    runs-on: ubuntu-22.04

    name: Formatting

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/setup_evap
        with:
          npm-ci: true

      - name: Check code formatting
        run: ruff format --check .
      - run: ls -laR evap/static/ts
      - name: Check TypeScript formatting
        run: npx prettier --list-different --log-level debug 'evap/static/ts/**/*.ts' 'evap/static/ts/eslint.config.js'

  backup-process:
    runs-on: ubuntu-22.04

    name: Backup process
    needs: build_wheel

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: main

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: e-valuation/evap-deployment
          path: deployment

      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31
      - name: Start database
        working-directory: deployment
        run: nix run ../main#services -- --detached

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wheel

      - name: Install wheel
        run: |
          WHEEL=$(echo *.whl)
          pip install $WHEEL[psycopg-binary]

      - name: Load test data
        working-directory: deployment
        run: |
          cat <(echo 'from evap.settings import *') ../main/evap/settings_test.py | tee deployment_settings.py
          python -m evap migrate
          python -m evap loaddata test_data
        env:
          DJANGO_SETTINGS_MODULE: deployment_settings
      - name: Backup database
        working-directory: deployment
        run: ./update_production.sh backup.json
        env:
          EVAP_OVERRIDE_BACKUP_FILENAME: true
          EVAP_SKIP_UPDATE: true
          EVAP_SKIP_APACHE_STEPS: true
          DJANGO_SETTINGS_MODULE: deployment_settings
      - name: Reload backup
        working-directory: deployment
        run: echo "yy" | ./load_production_backup.sh backup.json
        env:
          EVAP_SKIP_APACHE_STEPS: true
          DJANGO_SETTINGS_MODULE: deployment_settings

  nix-files-changed:
    runs-on: ubuntu-22.04
    name: Check whether nix files changed
    outputs:
      changed: ${{ steps.output-step.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: git fetch origin main --depth 1
      - id: output-step
        run: |
          set +e # don't crash if next command exits with nonzero
          git diff --exit-code origin/main -- flake.nix flake.lock uv.lock
          echo "changed=$?" | tee --append "$GITHUB_OUTPUT"

  macos-nix-build:
    runs-on: macos-15
    name: Build nix environment on MacOS
    needs: [ "nix-files-changed" ]
    if: needs.nix-files-changed.outputs.changed != 0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
      - uses: ./.github/setup_evap
        with:
          start-db: true
